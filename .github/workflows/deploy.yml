name: 'Publish application'
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    env:
      PUBLISH_FOLDER: /home/runner/work/Demos/Demos/Demos/bin/Release/net10.0/publish/wwwroot

    name: Build and Deploy Job
    steps:
      - name: Set the name of the repo in env variable 
        run: echo "REPO_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV
        
      - uses: actions/checkout@v6
      
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
   
      - name: Publish the website in its release form
        run: |
          dotnet workload install wasm-tools
          dotnet publish --configuration Release
  
      - name: Change base-tag
        run: sed -i 's/<base href="\/" \/>/<base href="\/Demos\/" \/>/g' $PUBLISH_FOLDER/index.html
  
      - name: Copy index.html to 404.html
        run: cp $PUBLISH_FOLDER/index.html $PUBLISH_FOLDER/404.html
      
      - name: Add .nojekyll file
        run: touch $PUBLISH_FOLDER/.nojekyll
        
      - name: Saving changes to gh-pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: ${{ env.PUBLISH_FOLDER }}
      - id: deployment
        uses: actions/deploy-pages@v5
